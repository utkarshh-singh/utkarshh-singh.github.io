<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="teal">
<!--
  HOW THIS PAGE WORKS:
  1. This HTML file is just a shell — it has no visible content.
  2. The <script type="module"> at the bottom loads pages/home.js
  3. home.js imports Header, Footer, and section components
  4. Each component fetches its JSON and injects HTML into the divs below.
  
  TO ADD A NEW SECTION: edit pages/home.js
  TO CHANGE CONTENT:    edit content/*.json
  TO CHANGE STYLES:     edit styles/*.css
  TO CHANGE THEME:      edit config/theme.config.js
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Filled dynamically by seo.js — these are fallbacks -->
  <title>Utkarsh Singh — Quantum Machine Learning Researcher</title>
  <meta name="description" content="Quantum ML researcher, engineer, and consultant." />

  <!-- Fonts: Zodiak (display) + Satoshi (body) from Fontshare -->
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=zodiak@400,500,600,700&f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet" />

  <!-- Lucide Icons (lightweight, tree-shakeable) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>

  <!-- Stylesheets — ORDER MATTERS -->
  <link rel="stylesheet" href="./styles/tokens.css" />
  <link rel="stylesheet" href="./styles/theme.css" />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/layout.css" />
  <link rel="stylesheet" href="./styles/components/nav.css" />
  <link rel="stylesheet" href="./styles/components/hero.css" />
  <link rel="stylesheet" href="./styles/components/cards.css" />
  <link rel="stylesheet" href="./styles/components/buttons.css" />
  <link rel="stylesheet" href="./styles/components/footer.css" />
  <link rel="stylesheet" href="./styles/components/fab.css">

  <!-- Favicon placeholder (replace with your own) -->
  <link rel="stylesheet" href="./styles/components/research.css" />
  <link rel="stylesheet" href="./styles/components/home-previews.css" />
  <link rel="stylesheet" href="./styles/components/projects.css" />
  <link rel="stylesheet" href="./styles/components/patents.css" />
  <link rel="stylesheet" href="./styles/components/skills.css" />
  <link rel="stylesheet" href="./styles/components/talks.css" />
  <link rel="stylesheet" href="./styles/components/services.css" />
  <link rel="stylesheet" href="./styles/components/contact.css" />
  <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml" />
</head>

<body>
  <!-- Skip to content (accessibility) -->
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- PAGE SHELL — Header, Main, Footer injected by JS -->
  <div class="page-shell">
    <div id="site-header" role="banner"></div>
    <main id="main-content" class="site-main" tabindex="-1"></main>
    <div id="site-footer" role="contentinfo"></div>
  </div>

  <!-- Entry point: loads all components for this page -->
  <script type="module" src="./pages/home.js"></script>
</body>
</html>
